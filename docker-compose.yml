services:
  db:
    image: mysql:9.2
    command: ["--collation-server=utf8mb4_unicode_ci"]
    restart: always
    environment:
      MYSQL_DATABASE: snippetbox
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: web
      MYSQL_PASSWORD: ${SNIPPETBOX_DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./testdata/setup.sql:/docker-entrypoint-initdb.d/setup.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
  web:
    build: .
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - SNIPPETBOX_DSN=web:${SNIPPETBOX_DB_PASSWORD}@tcp(db:3306)/snippetbox?parseTime=true
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data: