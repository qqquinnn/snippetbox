services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: snippetbox
      POSTGRES_USER: web
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./testdata/init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh
      - ./testdata/setup.sql:/docker-entrypoint-initdb.d/02-setup.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U web -d snippetbox" ]
      interval: 10s
      timeout: 5s
      retries: 5
  web:
    build: .
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - SNIPPETBOX_DSN=postgres://web:pass@db:5432/snippetbox?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
  test:
    image: golang:1.26.2-alpine
    profiles:
      - testing
    volumes:
      - .:/app
    working_dir: /app
    command: go test -v ./internal/models/...
    environment:
      - SNIPPETBOX_TEST_DSN=postgres://web:pass@db:5432/snippetbox_test?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
