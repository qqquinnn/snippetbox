services:
  db:
    image: mysql:9.2
    command: [ "--collation-server=utf8mb4_unicode_ci" ]
    restart: always
    environment:
      MYSQL_DATABASE: snippetbox
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: web
      MYSQL_PASSWORD: pass
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./testdata/setup.sql:/docker-entrypoint-initdb.d/setup.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10
  web:
    build: .
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
  test:
    image: golang:1.26.2-alpine
    profiles:
      - testing
    volumes:
      - .:/app
    working_dir: /app
    command: go test -v ./internal/models/...
    environment:
      - SNIPPETBOX_TEST_DSN=web:pass@tcp(db:3306)/snippetbox_test?parseTime=true&multiStatements=true
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
